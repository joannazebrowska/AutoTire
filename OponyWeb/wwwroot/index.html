<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="css/site.css">
        <title>AutoTire</title>
        <link rel="shortcut icon" href="images/icon.png">
    </head>
    <body>
        <div class = "topnav">
            <a class="active" href="index.html">Strona główna</a>
            <a id="safeDrive" href="test.html">Bezpieczna jazda</a>
        </div>

        <h1>Sprawdź pogodę i dobierz opony</h1>
        <p>Wpisz miasto, a AutoTire zajmie się resztą</p>

        <form id="search-section">
            <input type="text" id="cityInput" placeholder="nazwa miasta" required>
            <input type="submit" onclick="ShowSummary()" value="wyszukaj" id="searchBtn">
        </form>


        <h2 id="summary" style="display: none;">podsumowanie</h2>

        <div id="rows" style="display: none;">
            <div class="column">
                <div class="text">dni poniżej 7°C</div>
                <div class="container">
                    <strong id="daysBelow"></strong>
                </div>
            </div>

            <div class="column">
                <div class="text">rekomendacja</div>
                <div class="container">
                    <strong id="recommendation"></strong>
                </div>
            </div>

            <div class="column">
                <div class="text">średnia temperatura</div>
                <div class="container">
                    <strong id="averageTemp"></strong>
                </div>
            </div>
        </div>

            <div id="nerbayCarRepairReload">
                <h1 id="carRepair" style="display: none">pobliskie warsztaty</h1>
                <div id="x">
                    <div id="nerbayCarRepair">
                </div>
            </div>
        </div>
        
        <script src="js/site.js"></script>
    </body>
</html>
